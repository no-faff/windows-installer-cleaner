<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Window frame (rounded) -->
  <rect x="32" y="32" width="192" height="192" rx="24" ry="24"
        stroke="#f8fafc" stroke-width="14" fill="none"/>

  <!-- Window cross divider -->
  <line x1="128" y1="40" x2="128" y2="216" stroke="#f8fafc" stroke-width="10"/>
  <line x1="40" y1="128" x2="216" y2="128" stroke="#f8fafc" stroke-width="10"/>

  <!-- Diagonal wipe streak (cloth/squeegee motion across top-right pane) -->
  <line x1="145" y1="52" x2="205" y2="112"
        stroke="#4f46e5" stroke-width="16" stroke-linecap="round"/>
  <line x1="155" y1="48" x2="210" y2="103"
        stroke="#4f46e5" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Sparkle star 1 (top-left pane) -->
  <g transform="translate(80, 85)">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Sparkle star 2 (smaller, bottom-right pane) -->
  <g transform="translate(170, 175)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#f8fafc" stroke-width="4" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#f8fafc" stroke-width="4" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Sparkle dot 3 (tiny, bottom-left pane) -->
  <circle cx="75" cy="170" r="4" fill="#f8fafc"/>
</svg>
